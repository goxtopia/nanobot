<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survival Game</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #222;
            color: white;
            font-family: Arial, sans-serif;
            user-select: none;
        }
        canvas {
            display: block;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        #hp-bar-container {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 200px;
            height: 20px;
            background-color: #555;
            border: 2px solid #fff;
        }
        #hp-bar {
            width: 100%;
            height: 100%;
            background-color: #ff3333;
            transition: width 0.1s;
        }
        #xp-bar-container {
            position: absolute;
            top: 50px;
            left: 20px;
            width: 200px;
            height: 10px;
            background-color: #555;
            border: 1px solid #fff;
        }
        #xp-bar {
            width: 0%;
            height: 100%;
            background-color: #33ccff;
            transition: width 0.1s;
        }
        #level-text {
            position: absolute;
            top: 65px;
            left: 20px;
            font-weight: bold;
        }
        #score-text {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 24px;
            font-weight: bold;
        }

        .modal {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.85);
            padding: 30px;
            border: 2px solid white;
            text-align: center;
            pointer-events: auto;
            z-index: 10;
            border-radius: 10px;
        }
        #upgrade-menu {
            width: 400px;
        }
        .upgrade-option {
            background: #333;
            border: 1px solid #fff;
            border-radius: 5px;
            padding: 15px;
            margin: 10px 0;
            cursor: pointer;
            transition: background 0.2s;
        }
        .upgrade-option:hover {
            background: #555;
        }
        .upgrade-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 5px;
            color: #ffd700;
        }
        .upgrade-desc {
            font-size: 14px;
            color: #eee;
        }

        #game-over-menu {
            width: 300px;
        }
        button {
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
            background-color: #fff;
            color: #000;
            border: none;
            border-radius: 5px;
            margin-top: 20px;
            font-weight: bold;
        }
        button:hover {
            background-color: #ccc;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer">
        <div id="hp-bar-container"><div id="hp-bar"></div></div>
        <div id="xp-bar-container"><div id="xp-bar"></div></div>
        <div id="level-text">Level: 1</div>
        <div id="score-text">Score: 0</div>
    </div>

    <div id="upgrade-menu" class="modal">
        <h2>Level Up!</h2>
        <p>Select an upgrade:</p>
        <div id="upgrade-options-container"></div>
    </div>

    <div id="game-over-menu" class="modal">
        <h1>Game Over</h1>
        <p>Score: <span id="final-score">0</span></p>
        <button onclick="location.reload()">Restart</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        function resizeCanvas() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const hpBar = document.getElementById('hp-bar');
        const xpBar = document.getElementById('xp-bar');
        const levelText = document.getElementById('level-text');
        const scoreText = document.getElementById('score-text');
        const upgradeMenu = document.getElementById('upgrade-menu');
        const upgradeOptionsContainer = document.getElementById('upgrade-options-container');
        const gameOverMenu = document.getElementById('game-over-menu');
        const finalScoreText = document.getElementById('final-score');

        // Game State
        let isPaused = false;
        let score = 0;
        let frames = 0;
        let gameOver = false;
        let lastTime = 0;

        const keys = { w: false, a: false, s: false, d: false, ArrowUp: false, ArrowLeft: false, ArrowDown: false, ArrowRight: false };

        window.addEventListener('keydown', e => { if (keys.hasOwnProperty(e.key)) keys[e.key] = true; });
        window.addEventListener('keyup', e => { if (keys.hasOwnProperty(e.key)) keys[e.key] = false; });

        // Player Stats
        const player = {
            x: width / 2,
            y: height / 2,
            radius: 15,
            speed: 200, // px per second
            color: '#00ffcc',
            maxHp: 100,
            hp: 100,
            xp: 0,
            xpToNextLevel: 10,
            level: 1,
            attackRadius: 150,
            attackDamage: 10,
            attackCooldown: 1.0, // seconds
            attackTimer: 0,
            projectileSpeed: 400
        };

        const enemies = [];
        const projectiles = [];
        const gems = [];
        const floatingTexts = [];

        // Upgrades Configuration
        const availableUpgrades = [
            { id: 'dmg', name: 'More Damage', desc: '+5 Attack Damage', apply: () => player.attackDamage += 5 },
            { id: 'range', name: 'Wider Range', desc: '+50 Attack Radius', apply: () => player.attackRadius += 50 },
            { id: 'speed', name: 'Faster Movement', desc: '+30 Movement Speed', apply: () => player.speed += 30 },
            { id: 'atk_spd', name: 'Faster Attack', desc: '-15% Attack Cooldown', apply: () => player.attackCooldown *= 0.85 },
            { id: 'heal', name: 'Heal', desc: 'Restore 50 HP', apply: () => player.hp = Math.min(player.maxHp, player.hp + 50) },
            { id: 'max_hp', name: 'Max HP', desc: '+20 Max HP', apply: () => { player.maxHp += 20; player.hp += 20; } }
        ];

        // Enemy Types
        const enemyTypes = [
            { color: '#ff4444', radius: 10, speed: 100, hp: 20, damage: 10, xp: 1 },
            { color: '#ffaa00', radius: 15, speed: 70, hp: 40, damage: 20, xp: 3 },
            { color: '#ff00aa', radius: 8, speed: 150, hp: 10, damage: 5, xp: 1 }
        ];

        function getDistance(x1, y1, x2, y2) {
            return Math.hypot(x2 - x1, y2 - y1);
        }

        function spawnEnemy() {
            if (Math.random() > 0.05 + (frames * 0.00001)) return; // Spawn rate increases slightly over time

            const side = Math.floor(Math.random() * 4);
            let x, y;
            const margin = 50;

            if (side === 0) { x = Math.random() * width; y = -margin; } // Top
            else if (side === 1) { x = width + margin; y = Math.random() * height; } // Right
            else if (side === 2) { x = Math.random() * width; y = height + margin; } // Bottom
            else { x = -margin; y = Math.random() * height; } // Left

            // Choose type, tougher enemies appear later
            let typeIndex = 0;
            if (frames > 1000 && Math.random() < 0.3) typeIndex = 1;
            if (frames > 2000 && Math.random() < 0.2) typeIndex = 2;

            const type = enemyTypes[typeIndex];

            // HP scales slightly with time
            const hpMultiplier = 1 + (frames / 10000);

            enemies.push({
                x, y,
                radius: type.radius,
                speed: type.speed * (Math.random() * 0.4 + 0.8), // vary speed slightly
                color: type.color,
                hp: type.hp * hpMultiplier,
                maxHp: type.hp * hpMultiplier,
                damage: type.damage,
                xp: type.xp
            });
        }

        function updatePlayer(dt) {
            let dx = 0, dy = 0;
            if (keys.w || keys.ArrowUp) dy -= 1;
            if (keys.s || keys.ArrowDown) dy += 1;
            if (keys.a || keys.ArrowLeft) dx -= 1;
            if (keys.d || keys.ArrowRight) dx += 1;

            if (dx !== 0 || dy !== 0) {
                const len = Math.hypot(dx, dy);
                player.x += (dx / len) * player.speed * dt;
                player.y += (dy / len) * player.speed * dt;
            }

            // Keep within bounds
            player.x = Math.max(player.radius, Math.min(width - player.radius, player.x));
            player.y = Math.max(player.radius, Math.min(height - player.radius, player.y));

            // Auto Attack Logic
            player.attackTimer -= dt;
            if (player.attackTimer <= 0) {
                let nearestEnemy = null;
                let minDist = player.attackRadius;

                for (const enemy of enemies) {
                    const dist = getDistance(player.x, player.y, enemy.x, enemy.y);
                    if (dist < minDist) {
                        minDist = dist;
                        nearestEnemy = enemy;
                    }
                }

                if (nearestEnemy) {
                    const angle = Math.atan2(nearestEnemy.y - player.y, nearestEnemy.x - player.x);
                    projectiles.push({
                        x: player.x,
                        y: player.y,
                        vx: Math.cos(angle) * player.projectileSpeed,
                        vy: Math.sin(angle) * player.projectileSpeed,
                        radius: 4,
                        color: '#ffff00',
                        damage: player.attackDamage,
                        life: 2.0 // seconds
                    });
                    player.attackTimer = player.attackCooldown;
                }
            }
        }

        function spawnFloatingText(x, y, text, color) {
            floatingTexts.push({
                x, y,
                text,
                color,
                life: 1.0,
                vy: -30
            });
        }

        function dropGem(x, y, xp) {
            gems.push({
                x, y,
                radius: 4 + (xp * 0.5),
                color: '#33ccff',
                xp
            });
        }

        function showLevelUpMenu() {
            isPaused = true;
            upgradeOptionsContainer.innerHTML = '';

            // Pick 3 random distinct upgrades
            const shuffled = [...availableUpgrades].sort(() => 0.5 - Math.random());
            const options = shuffled.slice(0, 3);

            options.forEach(opt => {
                const div = document.createElement('div');
                div.className = 'upgrade-option';
                div.innerHTML = `<div class="upgrade-title">${opt.name}</div><div class="upgrade-desc">${opt.desc}</div>`;
                div.onclick = () => {
                    opt.apply();
                    isPaused = false;
                    upgradeMenu.style.display = 'none';
                    lastTime = performance.now(); // reset time to prevent dt spike
                    requestAnimationFrame(gameLoop);
                };
                upgradeOptionsContainer.appendChild(div);
            });

            upgradeMenu.style.display = 'block';
        }

        function gainXp(amount) {
            player.xp += amount;
            if (player.xp >= player.xpToNextLevel) {
                player.xp -= player.xpToNextLevel;
                player.level++;
                player.xpToNextLevel = Math.floor(player.xpToNextLevel * 1.5);
                levelText.innerText = `Level: ${player.level}`;
                showLevelUpMenu();
            }
            xpBar.style.width = `${(player.xp / player.xpToNextLevel) * 100}%`;
        }

        function checkCollisions() {
            // Projectiles hitting enemies
            for (let i = projectiles.length - 1; i >= 0; i--) {
                const p = projectiles[i];
                for (let j = enemies.length - 1; j >= 0; j--) {
                    const e = enemies[j];
                    if (getDistance(p.x, p.y, e.x, e.y) < p.radius + e.radius) {
                        e.hp -= p.damage;
                        spawnFloatingText(e.x, e.y - e.radius, Math.floor(p.damage).toString(), '#fff');
                        projectiles.splice(i, 1);

                        if (e.hp <= 0) {
                            dropGem(e.x, e.y, e.xp);
                            score += e.xp * 10;
                            scoreText.innerText = `Score: ${score}`;
                            enemies.splice(j, 1);
                        }
                        break;
                    }
                }
            }

            // Enemies hitting player
            for (const e of enemies) {
                if (getDistance(player.x, player.y, e.x, e.y) < player.radius + e.radius) {
                    player.hp -= e.damage * 0.016; // approximate per-frame damage (assuming 60fps)
                    hpBar.style.width = `${Math.max(0, (player.hp / player.maxHp) * 100)}%`;
                    if (player.hp <= 0) {
                        gameOver = true;
                    }
                }
            }

            // Player collecting gems
            for (let i = gems.length - 1; i >= 0; i--) {
                const g = gems[i];
                const dist = getDistance(player.x, player.y, g.x, g.y);
                const pickupRadius = 50; // magnetic radius

                if (dist < player.radius + g.radius) {
                    gainXp(g.xp);
                    gems.splice(i, 1);
                } else if (dist < pickupRadius) {
                    // magnetism
                    const angle = Math.atan2(player.y - g.y, player.x - g.x);
                    g.x += Math.cos(angle) * 200 * 0.016;
                    g.y += Math.sin(angle) * 200 * 0.016;
                }
            }
        }

        function update(dt) {
            frames++;
            spawnEnemy();
            updatePlayer(dt);

            // Update enemies
            for (const e of enemies) {
                const angle = Math.atan2(player.y - e.y, player.x - e.x);
                e.x += Math.cos(angle) * e.speed * dt;
                e.y += Math.sin(angle) * e.speed * dt;
            }

            // Update projectiles
            for (let i = projectiles.length - 1; i >= 0; i--) {
                const p = projectiles[i];
                p.x += p.vx * dt;
                p.y += p.vy * dt;
                p.life -= dt;
                if (p.life <= 0 || p.x < 0 || p.x > width || p.y < 0 || p.y > height) {
                    projectiles.splice(i, 1);
                }
            }

            // Update floating text
            for (let i = floatingTexts.length - 1; i >= 0; i--) {
                const t = floatingTexts[i];
                t.y += t.vy * dt;
                t.life -= dt;
                if (t.life <= 0) {
                    floatingTexts.splice(i, 1);
                }
            }

            checkCollisions();
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);

            // Draw grid background
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 1;
            const gridSize = 50;
            const offsetX = player.x % gridSize;
            const offsetY = player.y % gridSize;

            ctx.beginPath();
            for (let x = -offsetX; x < width; x += gridSize) {
                ctx.moveTo(x, 0); ctx.lineTo(x, height);
            }
            for (let y = -offsetY; y < height; y += gridSize) {
                ctx.moveTo(0, y); ctx.lineTo(width, y);
            }
            ctx.stroke();

            // Draw Gems
            for (const g of gems) {
                ctx.beginPath();
                ctx.arc(g.x, g.y, g.radius, 0, Math.PI * 2);
                ctx.fillStyle = g.color;
                ctx.fill();
            }

            // Draw Attack Radius
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.attackRadius, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
            ctx.stroke();

            // Draw Player
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
            ctx.fillStyle = player.color;
            ctx.fill();

            // Draw Enemies
            for (const e of enemies) {
                ctx.beginPath();
                ctx.arc(e.x, e.y, e.radius, 0, Math.PI * 2);
                ctx.fillStyle = e.color;
                ctx.fill();

                // Enemy HP bar
                const hpPercent = e.hp / e.maxHp;
                ctx.fillStyle = '#ff0000';
                ctx.fillRect(e.x - e.radius, e.y - e.radius - 8, e.radius * 2, 4);
                ctx.fillStyle = '#00ff00';
                ctx.fillRect(e.x - e.radius, e.y - e.radius - 8, e.radius * 2 * hpPercent, 4);
            }

            // Draw Projectiles
            for (const p of projectiles) {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.fill();
            }

            // Draw Floating Texts
            ctx.font = '14px Arial';
            ctx.textAlign = 'center';
            for (const t of floatingTexts) {
                ctx.fillStyle = `rgba(255, 255, 255, ${t.life})`;
                ctx.fillText(t.text, t.x, t.y);
            }
        }

        function gameLoop(timestamp) {
            if (isPaused) return;

            if (!lastTime) lastTime = timestamp;
            let dt = (timestamp - lastTime) / 1000;
            // Cap dt to prevent huge jumps if tab was inactive
            if (dt > 0.1) dt = 0.1;
            lastTime = timestamp;

            if (!gameOver) {
                update(dt);
            }

            draw();

            if (gameOver) {
                finalScoreText.innerText = score;
                gameOverMenu.style.display = 'block';
            } else {
                requestAnimationFrame(gameLoop);
            }
        }

        // Start
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
